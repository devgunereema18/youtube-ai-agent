name: AI Video Agent - Create & Upload Video

on:
  workflow_dispatch:
    inputs:
      topic:
        description: "Video topic"
        required: true
        default: "Artificial Intelligence for Beginners"
        type: string
      style:
        description: "Video style"
        required: true
        default: "educational"
        type: choice
        options:
          - educational
          - entertaining
          - tutorial
          - review
      privacy:
        description: "YouTube privacy status"
        required: true
        default: "private"
        type: choice
        options:
          - private
          - unlisted
          - public
      niche:
        description: "Content niche"
        required: false
        default: "technology"
        type: string

jobs:
  create-video:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create environment file
        run: |
          echo "VIDIQ_API_KEY=${{ secrets.VIDIQ_API_KEY }}" > .env
          echo "HEYGEN_API_KEY=${{ secrets.HEYGEN_API_KEY }}" >> .env
          echo "YOUTUBE_CLIENT_ID=${{ secrets.YOUTUBE_CLIENT_ID }}" >> .env
          echo "YOUTUBE_CLIENT_SECRET=${{ secrets.YOUTUBE_CLIENT_SECRET }}" >> .env
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env
          echo "HEYGEN_AVATAR_ID=default" >> .env
          echo "HEYGEN_VOICE_ID=default" >> .env
          echo "YOUTUBE_CATEGORY_ID=22" >> .env
          echo "YOUTUBE_DEFAULT_PRIVACY=${{ inputs.privacy }}" >> .env

      - name: Validate configuration
        run: python main.py --validate

      - name: Run AI Video Agent Pipeline
        run: |
          python main.py \
            --topic "${{ inputs.topic }}" \
            --style "${{ inputs.style }}" \
            --niche "${{ inputs.niche }}" \
            --privacy "${{ inputs.privacy }}"

      - name: Upload pipeline results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-results
          path: output/
          retention-days: 30
