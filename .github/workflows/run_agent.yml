name: AI Video Agent - Create & Upload Video

on:
  workflow_dispatch:
    inputs:
      topic:
        description: "Video topic"
        required: true
        default: "Artificial Intelligence for Beginners"
        type: string
      style:
        description: "Video style"
        required: true
        default: "educational"
        type: choice
        options:
          - educational
          - entertaining
          - tutorial
          - review
      privacy:
        description: "YouTube privacy status"
        required: true
        default: "private"
        type: choice
        options:
          - private
          - unlisted
          - public
      niche:
        description: "Content niche"
        required: false
        default: "technology"
        type: string

jobs:
  create-video:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create environment file
        run: |
          echo "VIDIQ_API_KEY=${{ secrets.VIDIQ_API_KEY }}" > .env
          echo "HEYGEN_API_KEY=${{ secrets.HEYGEN_API_KEY }}" >> .env
          echo "YOUTUBE_CLIENT_ID=${{ secrets.YOUTUBE_CLIENT_ID }}" >> .env
          echo "YOUTUBE_CLIENT_SECRET=${{ secrets.YOUTUBE_CLIENT_SECRET }}" >> .env
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env
          echo "HEYGEN_AVATAR_ID=default" >> .env
          echo "HEYGEN_VOICE_ID=default" >> .env
          echo "YOUTUBE_CATEGORY_ID=22" >> .env
          echo "YOUTUBE_DEFAULT_PRIVACY=${{ inputs.privacy }}" >> .env
          echo "Environment file created."
          echo "Checking keys are set..."
          if grep -q "VIDIQ_API_KEY=$" .env; then echo "WARNING: VIDIQ_API_KEY is empty"; fi
          if grep -q "HEYGEN_API_KEY=$" .env; then echo "WARNING: HEYGEN_API_KEY is empty"; fi
          if grep -q "YOUTUBE_CLIENT_ID=$" .env; then echo "WARNING: YOUTUBE_CLIENT_ID is empty"; fi
          if grep -q "YOUTUBE_CLIENT_SECRET=$" .env; then echo "WARNING: YOUTUBE_CLIENT_SECRET is empty"; fi

      - name: Create YouTube token file
        run: |
          echo '${{ secrets.YOUTUBE_TOKEN_JSON }}' > youtube_token.json
          if [ -s youtube_token.json ] && [ "$(cat youtube_token.json)" != "" ]; then
            echo "YouTube token file created successfully."
          else
            echo "No YouTube token found in secrets. First run will require OAuth."
            rm -f youtube_token.json
          fi

      - name: Validate configuration
        run: |
          python -c "
          import os
          from dotenv import load_dotenv
          load_dotenv()
          keys = {
              'VIDIQ_API_KEY': os.getenv('VIDIQ_API_KEY', ''),
              'HEYGEN_API_KEY': os.getenv('HEYGEN_API_KEY', ''),
              'YOUTUBE_CLIENT_ID': os.getenv('YOUTUBE_CLIENT_ID', ''),
              'YOUTUBE_CLIENT_SECRET': os.getenv('YOUTUBE_CLIENT_SECRET', ''),
          }
          missing = [k for k, v in keys.items() if not v]
          if missing:
              print('ERROR: Missing secrets:')
              for m in missing:
                  print(f'  - {m}')
              print()
              print('Go to: https://github.com/devgunereema18/youtube-ai-agent/settings/secrets/actions')
              print('Add the missing secrets listed above.')
              exit(1)
          else:
              print('All API keys configured successfully!')
          "

      - name: Run AI Video Agent Pipeline
        run: |
          python main.py \
            --topic "${{ inputs.topic }}" \
            --style "${{ inputs.style }}" \
            --niche "${{ inputs.niche }}" \
            --privacy "${{ inputs.privacy }}" \
            --no-upload

      - name: Upload pipeline results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-results
          path: output/
          retention-days: 30
