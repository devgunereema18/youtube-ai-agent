name: AI Video Agent - Create & Upload Video

on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'Video topic'
        required: true
        default: 'Artificial Intelligence for Beginners'
      style:
        description: 'Video style'
        required: true
        default: 'educational'
        type: choice
        options:
          - educational
          - entertaining
          - tutorial
          - review
      privacy:
        description: 'YouTube privacy status'
        required: true
        default: 'private'
        type: choice
        options:
          - private
          - unlisted
          - public
      niche:
        description: 'Content niche'
        required: false
        default: 'technology'

jobs:
  create-video:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env file from secrets
        env:
          VIDIQ_API_KEY: ${{ secrets.VIDIQ_API_KEY }}
          HEYGEN_API_KEY: ${{ secrets.HEYGEN_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          HEYGEN_AVATAR_ID: ${{ secrets.HEYGEN_AVATAR_ID }}
          HEYGEN_VOICE_ID: ${{ secrets.HEYGEN_VOICE_ID }}
          INPUT_PRIVACY: ${{ github.event.inputs.privacy }}
        run: |
          echo "VIDIQ_API_KEY=${VIDIQ_API_KEY}" > .env
          echo "HEYGEN_API_KEY=${HEYGEN_API_KEY}" >> .env
          echo "YOUTUBE_CLIENT_ID=${YOUTUBE_CLIENT_ID}" >> .env
          echo "YOUTUBE_CLIENT_SECRET=${YOUTUBE_CLIENT_SECRET}" >> .env
          echo "OPENAI_API_KEY=${OPENAI_API_KEY}" >> .env
          echo "HEYGEN_AVATAR_ID=${HEYGEN_AVATAR_ID:-default}" >> .env
          echo "HEYGEN_VOICE_ID=${HEYGEN_VOICE_ID:-default}" >> .env
          echo "YOUTUBE_CATEGORY_ID=22" >> .env
          echo "YOUTUBE_DEFAULT_PRIVACY=${INPUT_PRIVACY:-private}" >> .env

      - name: Create YouTube token from secret
        env:
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
        run: |
          if [ -n "${YOUTUBE_TOKEN_JSON}" ]; then
            echo "${YOUTUBE_TOKEN_JSON}" > youtube_token.json
            echo "YouTube token file created."
          else
            echo "No YouTube token secret found. Skipping."
          fi

      - name: Validate configuration
        run: python main.py --validate

      - name: Run AI Video Agent Pipeline
        run: |
          python main.py \
            --topic "${{ github.event.inputs.topic }}" \
            --style "${{ github.event.inputs.style }}" \
            --niche "${{ github.event.inputs.niche }}" \
            --privacy "${{ github.event.inputs.privacy }}"

      - name: Upload pipeline results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-results
          path: output/
          retention-days: 30
